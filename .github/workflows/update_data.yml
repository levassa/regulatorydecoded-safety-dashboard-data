name: Update Safety Dashboard Data

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.5.0
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl

      - name: Run data pipeline
        run: python pipeline/collect_and_normalise.py
        
      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git stash
          git pull --rebase origin main
          git stash pop
          git add data/
          git diff --cached --quiet || git commit -m "chore: update safety dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
