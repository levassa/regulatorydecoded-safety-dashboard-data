name: Update Safety Dashboard Data

# Runs daily at 07:00 UTC.
# Also triggered manually from the Actions UI (workflow_dispatch).
#
# Sources collected each run:
#   1. EU Safety Gate (RAPEX)  — OpenDataSoft REST API
#   2. CPSC                    — SaferProducts.gov REST API
#   3. Health Canada           — Open Government JSON feed
#   4. RappelConso (France)    — OpenDataSoft REST API
#   5. FDA openFDA             — device + food enforcement REST API
#   6. OPSS (UK)               — GOV.UK search API
#   7. ACCC (Australia)        — RSS feed
#   8. NZ Product Safety       — HTML scraper (BeautifulSoup)

on:
  schedule:
    - cron: '0 7 * * *'   # daily at 07:00 UTC
  workflow_dispatch:        # manual trigger from the Actions UI

jobs:
  update-data:
    runs-on: ubuntu-latest

    permissions:
      contents: write       # needed to push the updated /data/ files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas openpyxl beautifulsoup4 lxml

      - name: Run data pipeline
        run: python pipeline/collect_and_normalise.py

      - name: Commit and push updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ db/
          git stash
          git pull --rebase origin main
          git stash pop
          git add data/ db/
          git diff --cached --quiet || git commit -m "chore: update safety dashboard data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
